name: CI

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  # ─── Style check ─────────────────────────────────────────────────────────────
  # Runs first — fast feedback before tests spend minutes running.
  # Developers can fix locally with: ./gradlew spotlessApply
  style:
    name: Code Style (Spotless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Check code style
        run: ./gradlew spotlessCheck

  # ─── Unit tests ──────────────────────────────────────────────────────────────
  test:
    name: Unit Tests (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    needs: style
    strategy:
      matrix:
        java: [ '17', '21' ]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: gradle

      - name: Run unit tests
        run: ./gradlew test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-java${{ matrix.java }}
          path: build/reports/tests/test/

  # ─── Integration tests ───────────────────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Run integration tests
        run: ./gradlew integrationTest
        timeout-minutes: 10

  # ─── Publish release artifacts ───────────────────────────────────────────────
  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [ test, integration ]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Publish to Maven Central (OSSRH)
        run: ./gradlew publishMavenPublicationToOSSRHRepository
        env:
          OSSRH_USERNAME:   ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD:   ${{ secrets.OSSRH_PASSWORD }}
          RELEASE_VERSION:  ${{ steps.version.outputs.VERSION }}
          SIGNING_KEY:      ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}

      - name: Publish to GitHub Packages (mirror)
        run: ./gradlew publishMavenPublicationToGitHubPackagesRepository
        env:
          GITHUB_ACTOR:     ${{ github.actor }}
          GITHUB_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION:  ${{ steps.version.outputs.VERSION }}
          SIGNING_KEY:      ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/libs/jeth-*.jar
            build/libs/jeth-*-sources.jar
            build/libs/jeth-*-javadoc.jar
