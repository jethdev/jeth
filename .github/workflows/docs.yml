name: Docs

# Publishes the Dokka API reference to GitHub Pages.
#
# Triggers:
#   - Every push to main  (docs stay in sync with code)
#   - Every version tag   (release docs are always current)
#   - Manual dispatch     (re-run from the Actions tab anytime)
#
# Live site: https://jeth-io.github.io/jeth/
#
# One-time repo setup:
#   Settings → Pages → Source = "GitHub Actions"   (no branch needed)

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  workflow_dispatch:

# Cancel an in-progress run if a newer commit arrives.
# Only one deployment runs at a time; pages are never in a half-updated state.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ── Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build Dokka docs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      # dokkaHtml is the correct task name for Dokka 1.9.x.
      # Output lands in build/dokka/html/ as configured in build.gradle.
      - name: Generate Dokka HTML
        run: ./gradlew dokkaHtml

      # Upload as a Pages artifact so the deploy job can consume it.
      # actions/upload-pages-artifact expects a directory path.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/dokka/html

  # ── Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    permissions:
      pages:    write     # required to deploy to Pages
      id-token: write     # required for OIDC token the deploy action uses

    environment:
      name: github-pages
      url:  ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
